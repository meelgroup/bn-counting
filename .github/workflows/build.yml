
name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install libraries
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake bison re2c gringo clasp python3-pip

      - name: Install networkx
        run: |
          pip install networkx
          pip install clingo

      - name: Check installation
        run: |
          gringo --version
          clingo --version

      - name: Run build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Check fASP and tsconj installation
        run: |
          python -c "import fASP; print(fASP.version)"
          python -c "import tsconj; print(tsconj.version)"
          
      - name: Sample Run minimal trap space
        run: |
          cd script
          python run_minimal_trap_space.py -t 1 -bn t1_244.bnet | tee /tmp/out.txt
          grep -q "C-MTS-1" /tmp/out.txt
          python run_minimal_trap_space.py -t 2 -bn t1_244.bnet -phen phen_244.txt | tee /tmp/out.txt
          grep -q "C-MTS-2" /tmp/out.txt
          python run_minimal_trap_space.py -t 3 -bn t1_244.bnet -phen phen_244.txt -pert pert_244.txt | tee /tmp/out.txt
          grep -q "C-MTS-3" /tmp/out.txt

      - name: Sample Run fixed point
        run: |
          cd script
          python run_fixed_point.py -t 1 -bn t1_244.bnet | tee /tmp/out.txt
          grep -q "C-FIX-1" /tmp/out.txt
          python run_fixed_point.py -t 2 -bn t1_244.bnet -phen phen_244.txt | tee /tmp/out.txt
          grep -q "C-FIX-2" /tmp/out.txt
          python run_fixed_point.py -t 3 -bn t1_244.bnet -phen phen_244.txt -pert pert_244.txt | tee /tmp/out.txt
          grep -q "C-FIX-3" /tmp/out.txt